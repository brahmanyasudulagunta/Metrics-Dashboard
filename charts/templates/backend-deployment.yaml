apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app: {{ .Release.Name }}-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-api
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-api
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        # Adds a timestamp to always force a pod restart on 'helm upgrade' 
        # so that imagePullPolicy: Always can fetch the latest image even if the tag didn't change.
        rollme: {{ randAlphaNum 5 | quote }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name | default (printf "%s-api" .Release.Name) }}
      containers:
        - name: backend
          image: "{{ .Values.api.image }}:{{ .Values.api.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          {{- with .Values.api.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
            - secretRef:
                name: {{ .Release.Name }}-secret
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- if or .Values.persistence.enabled .Values.api.dockerSocket.enabled .Values.api.hostBinaryMounts.enabled }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /app/data
            {{- end }}
            {{- if .Values.api.dockerSocket.enabled }}
            - name: docker-socket
              mountPath: {{ .Values.api.dockerSocket.path }}
            {{- end }}
            {{- if .Values.api.hostBinaryMounts.enabled }}
            - name: kind-bin
              mountPath: /usr/local/bin/kind
              readOnly: true
            - name: kubectl-bin
              mountPath: /usr/local/bin/kubectl
              readOnly: true
            - name: docker-bin
              mountPath: /usr/bin/docker
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if or .Values.persistence.enabled .Values.api.dockerSocket.enabled .Values.api.hostBinaryMounts.enabled }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
        {{- end }}
        {{- if .Values.api.dockerSocket.enabled }}
        - name: docker-socket
          hostPath:
            path: {{ .Values.api.dockerSocket.path }}
            type: Socket
        {{- end }}
        {{- if .Values.api.hostBinaryMounts.enabled }}
        - name: kind-bin
          hostPath:
            path: {{ .Values.api.hostBinaryMounts.kindPath }}
            type: File
        - name: kubectl-bin
          hostPath:
            path: {{ .Values.api.hostBinaryMounts.kubectlPath }}
            type: File
        - name: docker-bin
          hostPath:
            path: {{ .Values.api.hostBinaryMounts.dockerPath }}
            type: File
        {{- end }}
