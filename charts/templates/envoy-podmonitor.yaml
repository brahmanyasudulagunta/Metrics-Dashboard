{{- if and .Values.gateway.enabled .Values.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ .Release.Name }}-envoy
  labels:
    release: {{ .Release.Name }}
spec:
  selector:
    matchLabels:
      gateway.envoyproxy.io/owning-gateway-name: {{ .Release.Name }}-gateway
  podMetricsEndpoints:
    - port: metrics
      path: /stats/prometheus
      interval: 15s
{{- end }}
