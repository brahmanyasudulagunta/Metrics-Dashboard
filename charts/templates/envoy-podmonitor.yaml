{{- if .Values.gateway.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ .Release.Name }}-envoy
  labels:
    release: {{ .Values.monitoring.releaseName | default "monitoring" }}
spec:
  namespaceSelector:
    any: true
  selector:
    matchLabels:
      gateway.envoyproxy.io/owning-gateway-name: {{ .Release.Name }}-gateway
  podMetricsEndpoints:
    - port: metrics
      path: /stats/prometheus
      interval: 15s
{{- end }}
