apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-dashboard
  labels:
    app: {{ .Release.Name }}-dashboard
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-dashboard
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-dashboard
      annotations:
        checksum/nginx-config: {{ include (print $.Template.BasePath "/nginx-configmap.yaml") . | sha256sum }}
        # Adds a timestamp to always force a pod restart on 'helm upgrade' 
        # so that imagePullPolicy: Always can fetch the latest image even if the tag didn't change.
        rollme: {{ randAlphaNum 5 | quote }}
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.dashboard.image }}:{{ .Values.dashboard.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          {{- with .Values.dashboard.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: {{ .Release.Name }}-nginx
