api:
  image: ashrith2727/backend-metrics
  tag: "v1"
  replicas: 1
  adminPassword: admin
  jwtSecret: supersecretkey
  devMode: false
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

dashboard:
  image: ashrith2727/frontend-metrics
  tag: "v1"
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi


# External Prometheus (used when monitoring.enabled=false)
# Set this to your existing Prometheus URL
prometheus:
  url: "http://prometheus-server:9090"

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""

# Gateway API resources (Gateway + HTTPRoute)
# Requires Envoy Gateway to be installed separately in the cluster
# See README for prerequisites
gateway:
  enabled: false
  host: metrics.example.com
  className: envoy
  port: 80

# App Health tab configuration
appHealth:
  # Set to false to completely hide the App Health tab metrics
  enabled: true
  # Which metrics provider to query (currently only "envoy" is supported)
  provider: envoy

serviceAccount:
  create: true
  name: ""

monitoring:
  # Set to false if you already have Prometheus in your cluster
  # When false, configure prometheus.url above to point to your existing Prometheus
  enabled: true
  releaseName: monitoring
  grafana:
    enabled: false            # our app IS the dashboard, no need for Grafana
  prometheus:
    prometheusSpec:
      retention: 7d
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
  alertmanager:
    enabled: false            # can enable later if needed
  nodeExporter:
    enabled: true
  prometheus-node-exporter:
    service:
      port: 9101              # avoid conflict with default 9100
      targetPort: 9101
    hostPort:
      enabled: false          # don't bind to host port — prevents scheduling conflicts
  kubeStateMetrics:
    enabled: true
