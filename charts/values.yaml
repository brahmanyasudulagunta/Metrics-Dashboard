backend:
  image: ashrith2727/backend-metrics
  tag: "v1"
  replicas: 1
  adminPassword: admin
  jwtSecret: supersecretkey
  devMode: false

frontend:
  image: ashrith2727/frontend-metrics
  tag: "v1"
  replicas: 1

prometheus:
  url: http://prometheus-server:9090

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""

ingress:
  enabled: false
  host: metrics.example.com
  className: nginx

serviceAccount:
  create: true
  name: ""

monitoring:
  prometheus:
    prometheusSpec:
      retention: 7d
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
  grafana:
    enabled: true
    adminPassword: admin
    service:
      type: ClusterIP
      port: 3000
  alertmanager:
    enabled: false          # disable for now, can enable later
  nodeExporter:
    enabled: true
  kubeStateMetrics:
    enabled: true
