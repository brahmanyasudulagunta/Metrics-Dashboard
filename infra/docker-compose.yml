services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules.yml:/etc/prometheus/rules.yml:ro
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-lifecycle'

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    privileged: true
    volumes:
      - /sys:/sys:ro

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    privileged: true
    ports:
      - "9000:8080"
    command:
      - '--housekeeping_interval=30s'
      - '--docker_only=true'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg

  backend:
    image: ashrith2727/backend-metrics:v1
    container_name: backend-metrics
    networks:
      - default
      - kind
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/local/bin/kind:/usr/local/bin/kind:ro
      - /usr/local/bin/kubectl:/usr/local/bin/kubectl:ro
      - /usr/bin/docker:/usr/bin/docker:ro
      - ~/.kube:/root/.kube
      - ../backend:/app
      - backend-data:/app/data
    env_file:
      - ../backend/.env
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
    ports:
      - "8000:8000"
    depends_on:
      - prometheus

  frontend:
    image: ashrith2727/frontend-metrics:v1
    container_name: frontend-metrics
    ports:
      - "3001:3001"
    depends_on:
      - backend

volumes:
  backend-data:


networks:
  default:
  kind:
    external: true
